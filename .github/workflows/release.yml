name: Release

# v* 태그가 push 되면 macOS(arm64)에서 Electron 앱을 빌드해 GitHub Release 에 .app(.zip) 을 올린다.
# 태그는 보통 모노레포(xingu-dev)의 sync 워크플로가 자동으로 민다 — 수동 태그 push 도 동일하게 동작한다.
# standalone 이 public 이라 macOS GitHub-hosted runner 가 무료다.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # softprops/action-gh-release 가 Release 생성·asset 업로드에 필요(기본 GITHUB_TOKEN 으로 충분)

jobs:
  build:
    runs-on: macos-14 # Apple Silicon(arm64) — 산출물도 arm64
    env:
      TZ: Asia/Seoul # 앱은 사용자 로컬 TZ 기반(layoutDay 자정 계산) — 테스트도 그 전제라 CI 를 KST 로 고정
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # version 은 package.json packageManager 필드에서 읽음
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Quality gate
        run: pnpm -r typecheck && pnpm -r lint && pnpm -r test
      - name: Build (.app/.zip)
        env:
          # esbuild define 이 번들에 구워넣는 OAuth client(데스크톱 client_id 는 PKCE 전제라 비밀 아님).
          # 없으면 빈 문자열로 박혀 배포본이 일정을 못 불러온다(로컬 빌드는 .env.local 로 자동 주입).
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: pnpm package # EXPORT next build + esbuild 번들 + electron-builder --mac(zip, 미서명)
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: apps/calendar-overlay-desktop/release/*-arm64-mac.zip
          generate_release_notes: true
          append_body: true
          # 미서명(adhoc) 앱이라 다운로드 시 macOS 가 quarantine 을 붙여 첫 실행에 "손상되었기 때문에
          # 열 수 없습니다" 로 차단한다(실제 손상 아님). 매 릴리스 노트에 해제 한 줄을 자동 포함.
          body: |
            ## macOS 설치 안내 — "손상되었기 때문에 열 수 없습니다" 가 뜨면

            정식 코드 서명이 안 된 앱이라 macOS 가 다운로드 파일에 quarantine 을 붙여 차단하는 것입니다(실제 손상 아님). 아래 한 줄로 해제하면 정상 실행됩니다.

            1. zip 을 풀어 **Calendar Overlay.app** 을 `/Applications` 로 옮깁니다.
            2. 터미널에서 실행:
               ```sh
               xattr -dr com.apple.quarantine "/Applications/Calendar Overlay.app"
               ```
            3. 앱을 실행합니다. (같은 버전은 이후 다시 안 뜹니다.)
